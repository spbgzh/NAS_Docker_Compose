services:
  alist:
    image: ghcr.io/monlor/xiaoya-alist:main
    container_name: xiaoya-alist
    volumes:
      - /volume1/docker/xiaoya/data/xiaoya:/data
    ports:
      - "5678:5678"
      - "2345:2345"
      - "2346:2346"
    environment:
      - AUTO_UPDATE_MEDIA_ADDR=true
    env_file:
      - env
    restart: unless-stopped
    networks:
      - default
  metadata:
    image: ghcr.io/monlor/xiaoya-metadata:main
    container_name: xiaoya-metadata
    env_file:
      - env
    volumes:
      - /volume1/docker/xiaoya/data/xiaoya:/etc/xiaoya
      - /volume1/docker/xiaoya/data/media:/media/xiaoya
      - /volume1/docker/xiaoya/data/config:/media/config
      - /volume1/docker/xiaoya/data/cache:/media/config/cache
      - /volume1/docker/xiaoya/data/meta:/media/temp
    depends_on:
      - alist
    restart: unless-stopped
    networks:
      - default
  emby:
    image: ghcr.io/monlor/xiaoya-embyserver:main
    container_name: xiaoya-embyserver
    env_file:
      - env
    depends_on:
      - metadata
      - alist
    volumes:
      - /volume1/docker/xiaoya/data/media:/media
      - /volume1/docker/xiaoya/data/config:/config
      - /volume1/docker/xiaoya/data/cache:/cache
    ports:
      - "6908:6908"
    restart: unless-stopped
    networks:
      - default

networks:
  default:
